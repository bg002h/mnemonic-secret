name: man-release

# On each `ms-cli-v*` tag, build the `ms` binary, self-emit its roff man pages
# (`ms gen-man`), tar them up, and attach `ms-man.tar.gz` to the GitHub release
# for that tag. The pages are clap-generated (binary-faithful by construction);
# the naive `generate_to` call emits zero `*-help*.1` shadow pages.

on:
  push:
    tags:
      - "ms-cli-v*"

permissions:
  contents: write

jobs:
  man-tarball:
    name: ms-man.tar.gz release asset
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REF_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Build the ms binary
        run: cargo build --release -p ms-cli --bin ms

      - name: Generate man pages + tarball
        run: |
          ./target/release/ms gen-man --out man
          # Negative canary: zero help-shadow pages (tripwire for an accidental pre-build).
          if ls man/*-help*.1 >/dev/null 2>&1; then
            echo "error: gen-man emitted *-help*.1 shadow pages" >&2
            exit 1
          fi
          tar czf ms-man.tar.gz -C man .

      - name: Ensure a release exists for the tag
        run: gh release view "$REF_NAME" || gh release create "$REF_NAME" --generate-notes

      - name: Upload ms-man.tar.gz
        run: gh release upload "$REF_NAME" ms-man.tar.gz --clobber

  # Static, dependency-free `ms` binaries for air-gapped / Alpine / musl boxes.
  # Builds both musl targets and attaches a static tarball per arch + a per-arch
  # SHA256SUMS to the SAME `ms-cli-v*` release the man tarball lands on.
  #
  # crt-static is ON BY DEFAULT for musl; NEVER pass
  # `-Ctarget-feature=-crt-static` (rust#135244 silently links host glibc). The
  # only C dep is the vendored libsecp256k1 in `secp256k1-sys`: x86_64-musl
  # native needs `musl-tools` (`musl-gcc`) + `CC_x86_64_unknown_linux_musl=
  # musl-gcc`; aarch64-musl uses `cross` (bundles the musl cross C toolchain).
  # Toolchain pinned `@1.85.0`.
  #
  # Security note: this job uses only GitHub-provided trusted context.
  musl-binaries:
    name: musl-binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REF_NAME: ${{ github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            musl_native: true
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            cross: true
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: ${{ matrix.target }}
      - if: ${{ matrix.musl_native }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - if: ${{ matrix.cross }}
        run: cargo install --locked cross
      - name: build-native
        if: ${{ matrix.musl_native }}
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: cargo build --release --target ${{ matrix.target }} -p ms-cli --bin ms
      - name: build-cross
        if: ${{ matrix.cross }}
        run: cross build --release --target ${{ matrix.target }} -p ms-cli --bin ms
      - name: package
        run: |
          VER="${REF_NAME##*-v}"
          tar czf "ms-${VER}-${{ matrix.arch }}-linux-musl.tar.gz" \
            -C "target/${{ matrix.target }}/release" ms
          sha256sum "ms-${VER}-${{ matrix.arch }}-linux-musl.tar.gz" > "SHA256SUMS.${{ matrix.arch }}"
      - name: ensure-release
        run: gh release view "$REF_NAME" >/dev/null 2>&1 || gh release create "$REF_NAME" --generate-notes
      - name: upload
        run: |
          gh release upload "$REF_NAME" ms-*-${{ matrix.arch }}-linux-musl.tar.gz --clobber
          gh release upload "$REF_NAME" "SHA256SUMS.${{ matrix.arch }}" --clobber
