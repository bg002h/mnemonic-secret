name: rust

# Cycle B PE — first Rust CI workflow for ms-cli. Mirrors the toolkit's
# `.github/workflows/rust.yml` (Phase 2 + 3a) per Cycle B SPEC §6 G3
# (Ubuntu + macOS platform coverage) and §6 G4.b (Miri on mlock's unsafe
# blocks). Wave-3 (ms-codec-no-ci-workflow) extended this single workflow
# with the repo-wide `fmt` (pinned 1.95.0) gate plus `test-ms-codec` /
# `clippy-ms-codec` jobs — ms-codec previously had NO CI of any kind — and
# widened the path filter to `crates/ms-codec/**` so those jobs fire.
#
# ms-cli is a binary-only crate (`[[bin]] name = "ms"`) — the `mlock`
# module is binary-private (declared via `mod mlock;` in `main.rs`).
# Test invocations target the binary's test build, NOT a `--lib` target.
#
# Security note: this workflow uses only GitHub-provided trusted context
# (matrix.os, runner.os). No interpolation of untrusted user input
# (issue/PR titles, commit messages, etc.).

on:
  push:
    branches: [main, master]
    paths:
      - 'crates/ms-cli/**'
      - 'crates/ms-codec/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - 'crates/ms-cli/**'
      - 'crates/ms-codec/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yml'

jobs:
  # Dedicated rustfmt gate, pinned to a CANONICAL formatter version (1.95.0,
  # matching the toolkit's CI + mnemonic-key). rustfmt output drifts between
  # toolchain releases, so the FORMATTER is pinned independently of the build
  # MSRV: bump it DELIBERATELY (install the new version + re-run `cargo +<new>
  # fmt --all` in the SAME commit). The explicit `+1.95.0` is REQUIRED here —
  # this repo's `rust-toolchain.toml` pins 1.85.0, which a bare `cargo fmt`
  # would otherwise use (and which formats differently). The whole workspace
  # (ms-codec + ms-cli) was reformatted to 1.95.0 in the standalone chore(fmt)
  # commit that immediately precedes this CI commit.
  #
  # EXEMPTION — `crates/ms-cli/src/mlock.rs` is the ONE file excluded from this
  # gate. It is a cross-repo byte-synced file governed by the `g6` invariant
  # (see the "g6-invariant" job below): it must stay byte-equal (modulo
  # comments) to `crates/mnemonic-toolkit/src/mlock.rs` in mnemonic-toolkit,
  # and g6 pins the FROZEN `ms-cli-v0.7.0` tag (via the toolkit's
  # scripts/install.sh), whose copy is NOT 1.95.0-formatted. So mlock.rs's
  # format is pinned to that tag, NOT to this formatter — a bare `cargo fmt
  # --all` would re-wrap it and break g6. The exemption is durably recorded in
  # design/FOLLOWUPS.md (mlock-rs-fmt-exempt / mlock-g4-a-page-count-assert-
  # flake, toolkit-side primaries). When the ms-cli g6 pin is next bumped to a
  # 1.95.0-formatted tag, reformat mlock.rs in BOTH repos in lockstep and drop
  # this exemption.
  fmt:
    name: fmt (pinned 1.95.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.95.0 (canonical fmt toolchain)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: rustfmt
      - name: Rustfmt (pinned 1.95.0, overriding rust-toolchain.toml; mlock.rs exempt)
        # `cargo fmt --all -- --check` over the whole workspace (handles each
        # crate's edition automatically), then tolerate diffs ONLY in mlock.rs
        # (the g6-pinned cross-repo file — see the exemption note above). rustfmt
        # 1.95.0 emits one `Diff in <path>:<line>:` header per file needing
        # formatting; we fail iff any NON-mlock.rs file appears.
        run: |
          out=$(cargo +1.95.0 fmt --all -- --check 2>&1) || true
          bad=$(printf '%s\n' "$out" | grep -oE '^Diff in [^:]+' \
            | sed 's/^Diff in //' | grep -v '/mlock\.rs$' || true)
          if [ -n "$bad" ]; then
            echo "::error::rustfmt 1.95.0 — these non-exempt files need formatting:"
            printf '%s\n' "$bad"
            printf '%s\n' "$out"
            exit 1
          fi
          echo "rustfmt 1.95.0 clean (mlock.rs exempt by the g6 cross-repo invariant)"

  test-ms-codec:
    # ms-codec is a pure lib crate (no mlock, no ulimit dance, no FAIL_MODE
    # matrix, no platform-specific code) — single Linux runner is sufficient.
    # This is the FIRST CI coverage for ms-codec (burns down the
    # ms-codec-no-ci-workflow FOLLOWUP).
    name: test (ms-codec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo test -p ms-codec
        run: cargo test -p ms-codec

  clippy-ms-codec:
    name: clippy (ms-codec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo clippy -p ms-codec --all-targets -- -D warnings
        # No --all-features: ms-codec has no [features] table.
        run: cargo clippy -p ms-codec --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Show ulimit -l (diagnostic)
        run: ulimit -l || true

      - name: cargo build --tests
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          cargo build --tests -p ms-cli

      - name: cargo test (default tests; G2.1 #[ignore]-gated)
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          cargo test -p ms-cli

      - name: G2.1 eperm fault injection (fresh subprocess; env set before cargo)
        # Per Cycle B SPEC §4 P2 + toolkit Phase 2 plan: cfg(test) FAIL_MODE
        # injection is only reachable from the bin's test build (cfg(test) is
        # per-crate-not-per-build, RFC 1604). G2.1 is #[ignore]-gated and
        # filtered to the specific test name so the OnceLock<FailMode>
        # initializes fresh from MNEMONIC_TEST_MLOCK_FAIL_MODE in this step's
        # env. ms-cli has no [[lib]] target — invoke via --bin ms.
        env:
          MNEMONIC_TEST_MLOCK_FAIL_MODE: "eperm"
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          cargo test -p ms-cli --bin ms mlock::tests::g2_1 -- --include-ignored

      - name: G2.3-debug einval debug_assert (fresh subprocess)
        # Per Cycle B SPEC §6 G2.3: debug builds trip debug_assert when
        # mlock returns EINVAL under fault injection.
        # #[should_panic(expected = "EINVAL")] asserts the panic message
        # contains the substring.
        env:
          MNEMONIC_TEST_MLOCK_FAIL_MODE: "einval"
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          cargo test -p ms-cli --bin ms mlock::tests::g2_3 -- --include-ignored

      - name: G2.4 off control (fresh subprocess)
        # Per Cycle B SPEC §6 G2.4: control case — FAIL_MODE=off must not
        # synthesize failures. Verifies the wrapper does not increment
        # failure_count spuriously in a healthy ulimit environment.
        # NOTE: bare 'off' in YAML 1.1 is a boolean false; quote to force
        # string interpretation (toolkit workflow first observed this at
        # run 25834458333 on 2026-05-14; mirror the defense here).
        env:
          MNEMONIC_TEST_MLOCK_FAIL_MODE: "off"
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            ulimit -l 65536 || true
          fi
          cargo test -p ms-cli --bin ms mlock::tests::g2_4 -- --include-ignored

  test-release-mlock-einval:
    # Cycle B Phase 3a (mirror in ms-cli at PE) — release-build coverage
    # for G2.3 EINVAL soft-fail. Per SPEC §6 G2.3 release branch: in
    # release builds the debug_assert is compiled out, so EINVAL injection
    # must soft-fail (record_failure) rather than panic. The
    # g2_3_einval_release_soft_fails test (inline-copied from toolkit
    # mlock.rs) asserts failure_count > 0 and first_errno == EINVAL.
    # Linux-only because the release-build-coverage gate is sufficient on
    # one platform; the cfg(test) FAIL_MODE branch is platform-uniform.
    name: "test (release, ubuntu-latest, mlock einval)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show ulimit -l (diagnostic)
        run: ulimit -l || true
      - name: G2.3-release einval soft-fail
        env:
          MNEMONIC_TEST_MLOCK_FAIL_MODE: "einval"
        run: |
          ulimit -l 65536 || true
          cargo test --release -p ms-cli --bin ms mlock::tests::g2_3 -- --include-ignored

  miri:
    name: miri (mlock unsafe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly + miri component
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: "cargo +nightly miri test mlock::"
        # Per Cycle B SPEC §6 G4.b: Miri verifies the Rust-side safety of
        # mlock's 2 unsafe blocks (libc::mlock in pin_pages_for;
        # libc::munlock in PinnedPageRange::drop). cfg(miri) shims stub the
        # syscalls. ms-cli is binary-only; invoke via --bin ms.
        run: "cargo +nightly miri test -p ms-cli --bin ms mlock::"

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: conformance-vector checksum pin
        run: cd design && sha256sum -c display-grouping-vectors.tsv.sha256

      - name: cargo clippy --all-targets -- -D warnings
        run: cargo clippy --all-targets -p ms-cli -- -D warnings

  g6-invariant:
    # Cycle B SPEC §6 G6 — cross-repo mlock.rs inline-copy invariant.
    # Checks out the sibling repo (mnemonic-toolkit) to a known runner
    # path, then runs `tests/mlock_g6_invariant.rs` which asserts the
    # normalized source of ms-cli's `crates/ms-cli/src/mlock.rs` and
    # toolkit's `crates/mnemonic-toolkit/src/mlock.rs` are byte-equal
    # across the diff manifest plus name-export parity. Test pulls the
    # sibling path from $SIBLING_REPO_PATH.
    name: "g6 invariant (cross-repo mlock.rs)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout own (mnemonic-secret)
        uses: actions/checkout@v4
        with:
          path: mnemonic-secret
      - name: Checkout sibling (mnemonic-toolkit)
        uses: actions/checkout@v4
        with:
          repository: bg002h/mnemonic-toolkit
          ref: master
          path: mnemonic-toolkit
      - name: cargo test --test mlock_g6_invariant
        env:
          SIBLING_REPO_PATH: ${{ github.workspace }}/mnemonic-toolkit
        working-directory: mnemonic-secret
        # G6 tests are #[ignore]-gated to keep the default `cargo test`
        # step (which has no SIBLING_REPO_PATH set + no sibling checkout)
        # from invoking them. --include-ignored opts them in for this job
        # which DOES have both.
        run: cargo test -p ms-cli --test mlock_g6_invariant -- --include-ignored

  freebsd-compile-gate:
    # Cycle C — FreeBSD compile-gate. Catches the day a Linux-only syscall /
    # cfg / crate breaks the `cargo install`-on-FreeBSD path, and compile-covers
    # the BSD secret-hygiene arm in `src/process_hardening.rs`
    # (procctl/setrlimit). `x86_64-unknown-freebsd` is Tier 2 with Host Tools,
    # so `rustup target add` ships a precompiled std on the ubuntu runner; no
    # apt cross-compiler step is needed (cargo check stops before link; the only
    # C step is the vendored libsecp256k1 cc compile, which builds against the
    # Tier-2 std — validated locally with bare rustup). Fallback if that ever
    # needs a freebsd sysroot: switch to `cross check --target …` (cross-rs
    # bundles a freebsd container).
    #
    # CRITICAL — this MUST be a WHOLE-CRATE check (`cargo check --target …`),
    # NEVER `--lib`. ms-cli is a BIN-ONLY crate (`[[bin]] name = "ms"`, no
    # `src/lib.rs`); its `process_hardening` lives only in the bin target
    # (`mod process_hardening;` in `main.rs`). A `cargo check --lib` would
    # compile nothing relevant and give silent false-green coverage of the
    # entire BSD hardening arm. Only the bare whole-crate check reaches
    # `main.rs` and therefore the hardening module. (The toolkit's `--lib` row
    # is a special case that works only because the toolkit alone declares
    # `process_hardening` as `pub mod` in `src/lib.rs`.)
    #
    # Security note: this job uses only GitHub-provided trusted context. No
    # interpolation of untrusted user input.
    name: freebsd compile-gate (whole-crate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: x86_64-unknown-freebsd
      - run: cargo check --target x86_64-unknown-freebsd -p ms-cli
